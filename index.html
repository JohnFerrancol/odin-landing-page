<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="IE=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Odin Landing Page</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <!-- Navbar -->
        <nav>
            <ul>
                <li href="#" class="logo">
                    <img src="images/odin-lined.png" alt="header logo" id="logo">
                    Odin Learning
                </li>
                <div class="right-links">
                    <li href="#" class="header-links">Courses</li>
                    <li href="#" class="header-links">Grades</li>
                    <li href="#" class="header-links">Tools</li>
                </div>
            </ul>
        </nav>

        <main>
            <div class="about">
                <div class="about-content">
                    <h1 class="about-header">Learning Programming has never been easier!</h1>
                    <p class="about-paragraph">Learn Coding at Odin Learning!</p>
                    <button class="signup-button">Sign up</button>
                </div>
                <div class="about-image">
                    <img src="images/coding.jpg" alt="person coding" id="about-image">
                </div>
            </div>
            <div class="courses">
                Courses available
            </div>
            <div class="quote">
                Quote
            </div>
            <div class="signup">
                Sign up
            </div>
        </main>

        <!-- Footer -->
        <footer>
            Copyright © John Ferrancol 2023
        </footer>
    </body>
</html>
